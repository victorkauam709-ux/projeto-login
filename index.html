<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-querry.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Faça login para acessar a sua conta do Guess The Word.</p><br>
                <form action="login.php" method="post" autocomplete="on">

                     <div class="campo">
                         <span class="material-symbols-outlined">person
                         </span>
                         <input type="email" name="email" id="iemail" autocomplete="email" placeholder="seu e-mail" required maxlength="30">
                         <label for="iemail">Login</label>
                         
                     </div>

                     <div class="campo">
                         <span class="material-symbols-outlined">vpn_key
                         </span>
                         <input type="password" name="Senha" id="isenha" autocomplete="current-password" placeholder="sua senha" required minlength="8" maxlength="12">
                           <label for="isenha">Senha</label>
                         <label for="iacessar"></label><br><br>
                         <input type="submit" value="Acessar Conta">
                         <input type="reset" value="Limpar">
                     </div>
                </form>
            </div>
        </section>
    </main>
    
</body>
</html>
